name: Refresh Amenity Data

on:
  schedule:
    # Every Monday at 02:00 SGT (18:00 UTC Sunday)
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh-amenities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch amenity data (attempt 1)
        id: attempt1
        continue-on-error: true
        run: python scripts/fetch-amenities.py

      - name: Fetch amenity data (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "Attempt 1 failed, retrying after 30s..."
          sleep 30
          python scripts/fetch-amenities.py

      - name: Fetch amenity data (attempt 3)
        if: steps.attempt2.outcome == 'failure'
        run: |
          echo "Attempt 2 failed, retrying after 60s..."
          sleep 60
          python scripts/fetch-amenities.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/amenities/
          git diff --staged --quiet || git commit -m "chore: refresh amenity data [$(date -u '+%Y-%m-%d')]"
          git push

      - name: Trigger redeploy
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            })
